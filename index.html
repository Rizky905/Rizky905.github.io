<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/styling/js/fullpage.css">
    <link rel="stylesheet" href="assets/styling/css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />

    <title>Document</title>
</head>

<body>
    <div class="container-cus">
        <div class="paralax">
            <nav class="navbar navbar-expand-lg navbar-inverse fixed-top">
                <div class="container-fluid mt-4" id="text-header">
                    <a class="navbar-brand page-scroll ms-5" href="#portofolio">Rizky Erlangga</a>
                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                        <span class="navbar-toggler-icon"></span>
                    </button>
                    <div class="collapse navbar-collapse" id="navbarSupportedContent">
                        <ul class="navbar-nav ms-auto">
                            <li class="nav-item dropdown">
                                <a class="nav-link ms-1 page-scroll" href="#about">About</a>
                            </li>
                            <li class="nav-item dropdown">
                                <a class="nav-link ms-1 page-scroll" href="#contact">Contact</a>
                            </li>
                        </ul>
                    </div>
                </div>
            </nav>
            <div id="fullpage">
                <div class="section section-heading" id="section0">
                    <p data-aos="fade-up" data-aos-duration="500" class="scroll-down-text">
                        SCROLLDOWN
                    </p>
                    <div class="portofolio-name">
                        <h1 data-aos="fade-right" data-aos="fade-right" data-aos-offset="100" data-aos-duration="350"
                            data-aos-easing="ease-in-sine" class="name">
                            Rizky Erlangga</h1>
                        <div data-aos="fade-right" data-aos-offset="100" data-aos-easing="ease-in-sine"
                            data-aos-duration="500" class="horizontal1">
                        </div>
                        <div data-aos="fade-right" data-aos-offset="100" data-aos-duration="600"
                            data-aos-easing="ease-in-sine" class="horizontal2">
                        </div>
                        <p data-aos="fade-right" data-aos-offset="100" data-aos-duration="600"
                            data-aos-easing="ease-in-sine" class="role">
                            Web Programmer
                        </p>
                    </div>
                    <div class="portofolio-image">
                        <img data-aos="fade-left" data-aos-anchor="#example-anchor" data-aos-offset="500"
                            data-aos-duration="500" class="head-image" src="assets/image/portofolio-img.png"
                            alt="image-hello">
                        <!-- <p class="portofolio-text">
                            PORTOFOLIO
                        </p> -->
                    </div>
                </div>
                <div class="section section-heading" id="section2">
                    <h1>No wraps, no extra markup</h1>
                    <h1 data-aos="fade-up" data-aos-duration="300">The Heading 3</h1>
                </div>
                <div class="section section-heading" id="section3">
                    <h1>Just the simplest demo ever</h1>
                </div>
            </div>
        </div>

    </div>
    <script src="http://ajax.googleapis.com/ajax/libs/jquery/1.7.1/jquery.min.js" type="text/javascript"></script>
    <script type="text/javascript" src="./assets/styling/js/fullpage.js"></script>
    <script src="assets/styling/js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p"
        crossorigin="anonymous"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        AOS.init();
    </script>


</body>

</html>
